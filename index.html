<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Críticos Pathfinder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="panel">
    <header class="panel__header">
      <span class="panel__title">Críticos <em>Pathfinder</em></span>
      <div class="header__right">
        <span class="panel__subtitle" id="playerTag"></span>
        <div class="lang-switch">
          <button class="lang-btn" data-lang="es" title="Español">ES</button>
          <button class="lang-btn" data-lang="en" title="English">EN</button>
          <button class="lang-btn" data-lang="spanglish" title="Descripciones en español, condiciones en inglés">ES·EN</button>
        </div>
      </div>
    </header>

    <nav class="tabs" id="tabs">
      <button class="tab" data-type="cortante">Cortante</button>
      <button class="tab" data-type="perforante">Perforante</button>
      <button class="tab" data-type="contundente">Contundente</button>
      <button class="tab" data-type="energia">Energía</button>
    </nav>

    <div class="stage">
      <div class="card" id="card">
        <div class="card__face card__face--back">
          <svg viewBox="0 0 100 100" class="card__sigil">
            <circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M50 20 L58 44 L50 52 L42 44 Z" fill="currentColor"/>
            <rect x="47.5" y="52" width="5" height="26" rx="2" fill="currentColor"/>
            <rect x="40" y="58" width="20" height="5" rx="2" fill="currentColor"/>
          </svg>
          <span class="card__back-label" id="backLabel">Carta boca abajo</span>
        </div>
        <div class="card__face card__face--front">
          <div class="card__ribbon" id="ribbon">Leve</div>
          <div class="card__roll" id="rollValue">–</div>
          <div class="card__type" id="cardType">Cortante</div>
          <p class="card__text" id="cardText">Saca una carta para revelar el efecto.</p>
          <div class="card__glossary" id="cardGlossary"></div>
        </div>
      </div>
    </div>

    <button class="draw-btn" id="drawBtn">
      <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M10 2 L11.4 7.6 L10 9.4 L8.6 7.6 Z"/>
        <line x1="10" y1="9.4" x2="10" y2="17"/>
      </svg>
      <span id="drawBtnLabel">Sacar carta</span>
    </button>

    <label class="share-toggle" id="shareRow" hidden>
      <input type="checkbox" id="shareCheck" checked />
      <span id="shareLabel">Compartir con la mesa</span>
    </label>

    <section class="log">
      <div class="log__title" id="logTitle">Historial</div>
      <ul class="log__list" id="logList"></ul>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
